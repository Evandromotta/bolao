<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão da Copa do Mundo 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');


:root{
  --bg:#0A1410;
  --surface:#11201A;
  --surface-2:#1B2D24;
  --line:rgba(255,255,255,.08);
  --turf:#34C77B;
  --turf-dim:#1F7A4A;
  --amber:#FFC845;
  --cream:#F3F1E6;
  --muted:#8AA39A;
  --bad:#FF6F6F;
}

*{box-sizing:border-box;}
body{margin:0;}
.app{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(52,199,123,.12), transparent 60%),
    var(--bg);
  color:var(--cream);
  min-height:100%;
  padding-bottom:40px;
}

/* ---------- HERO ---------- */
.hero{
  padding:36px 20px 24px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(160deg, rgba(31,122,74,.35), transparent 70%);
}
.hero .eyebrow{
  font-family:'JetBrains Mono', monospace;
  font-size:.72rem;
  letter-spacing:.22em;
  color:var(--turf);
  text-transform:uppercase;
  margin:0 0 6px;
}
.hero h1{
  font-family:'Oswald', sans-serif;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
  font-size:clamp(1.8rem, 6vw, 3rem);
  margin:0;
  line-height:1.05;
}
.hero h1 span{color:var(--amber);}
.legend{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}
.legend-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 14px;
  font-size:.78rem;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
}
.legend-chip b{
  font-family:'Oswald',sans-serif;
  font-size:.95rem;
  color:var(--cream);
}
.dot{width:10px;height:10px;border-radius:50%;}
.dot.exact{background:var(--turf);}
.dot.result{background:var(--amber);}
.dot.miss{background:var(--bad);}

/* ---------- TABS ---------- */
.tabbar{
  position:sticky;top:0;z-index:20;
  display:flex;
  background:rgba(10,20,16,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.tab{
  flex:1;
  text-align:center;
  padding:14px 8px;
  font-family:'Oswald',sans-serif;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-size:.85rem;
  color:var(--muted);
  background:none;border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:.15s;
}
.tab.active{
  color:var(--amber);
  border-bottom-color:var(--amber);
}
.tab:hover{color:var(--cream);}

/* ---------- FILTER ROWS ---------- */
.filters{
  display:flex;
  gap:8px;
  padding:14px 20px 4px;
  overflow-x:auto;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.pill{
  flex:0 0 auto;
  font-family:'Oswald',sans-serif;
  font-weight:600;
  letter-spacing:.05em;
  font-size:.8rem;
  text-transform:uppercase;
  padding:8px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--muted);
  cursor:pointer;
  transition:.15s;
  white-space:nowrap;
}
.pill.active{
  background:var(--turf);
  color:#06160E;
  border-color:var(--turf);
}
.pill:hover:not(.active){border-color:var(--turf);color:var(--cream);}

.participant-row{
  display:flex;gap:8px;align-items:center;
  padding:14px 20px 4px;
  flex-wrap:wrap;
}
.add-participant{
  display:flex;gap:6px;align-items:center;
}
.add-participant input{
  font-family:'Inter',sans-serif;
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:999px;
  padding:8px 14px;
  color:var(--cream);
  font-size:.82rem;
  outline:none;
  width:150px;
}
.add-participant input:focus{border-color:var(--turf);}
.add-participant button, .icon-btn{
  font-family:'Oswald',sans-serif;
  font-weight:600;
  background:var(--turf-dim);
  color:var(--cream);
  border:1px solid var(--turf);
  border-radius:999px;
  padding:8px 16px;
  font-size:.78rem;
  letter-spacing:.05em;
  text-transform:uppercase;
  cursor:pointer;
}
.add-participant button:hover{background:var(--turf);color:#06160E;}
.pill .remove{
  margin-left:8px;opacity:.6;font-weight:700;
}
.pill .remove:hover{opacity:1;color:var(--bad);}

/* ---------- ROUND NAV ---------- */
.round-nav{
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:14px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
}
.round-nav .rn-title{
  font-family:'Oswald',sans-serif;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  font-size:.95rem;color:var(--cream);
  min-width:140px;text-align:center;
}
.round-nav .rn-arrow{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--line);background:var(--surface-2);
  color:var(--turf);font-size:1.1rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.round-nav .rn-arrow:hover{border-color:var(--turf);}

/* ---------- MATCH LIST (modelo "rodada") ---------- */
.match-list{
  background:#EEF2F0;
  padding:18px 16px 32px;
  display:flex;flex-direction:column;gap:12px;
}
.match-row{
  max-width:560px;width:100%;margin:0 auto;
  background:#FFFFFF;
  border:1px solid #E1E6E3;
  border-radius:12px;
  padding:14px 16px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.match-row .match-head{
  text-align:center;
  font-size:.74rem;
  color:#8C9A95;
  font-weight:600;
  margin-bottom:10px;
  letter-spacing:.02em;
}
.match-row .match-head .stadium{color:#33433C;font-weight:700;}
.match-row .match-body{
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.match-row .side{
  flex:1;min-width:0;
  display:flex;align-items:center;gap:8px;
  font-family:'Oswald',sans-serif;font-weight:600;font-size:.9rem;
  color:#33433C;
}
.match-row .side.home{justify-content:flex-end;text-align:right;}
.match-row .side.away{justify-content:flex-start;text-align:left;}
.match-row .side .tname{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.match-row .side .flag{
  flex:0 0 auto;
  width:26px;height:19px;
  border-radius:3px;
  overflow:hidden;
  box-shadow:0 0 0 1px #E1E6E3;
  background:#F1F5F2;
  display:inline-block;
  line-height:0;
}
.match-row .side .flag svg{
  display:block;width:100%;height:100%;
}
.match-row .score{
  display:flex;align-items:center;gap:6px;flex:0 0 auto;
}
.match-row .score input{
  width:38px;height:38px;text-align:center;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:1.2rem;
  color:#1F7A4A;
  background:#F1F5F2;
  border:1px solid #DCE4E0;border-radius:8px;
  outline:none;-moz-appearance:textfield;
}
.match-row .score input::-webkit-outer-spin-button,
.match-row .score input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.match-row .score input:focus{border-color:var(--turf);box-shadow:0 0 0 3px rgba(52,199,123,.15);}
.match-row .score .x{font-family:'Oswald',sans-serif;font-weight:700;color:#B7C2BD;}
.match-row .score input:disabled{
  background:#E9EDEA;color:#A8B5AF;border-color:#E1E6E3;
  cursor:not-allowed;
}
.match-row .lock-tag{
  display:inline-block;margin-left:8px;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:.62rem;
  letter-spacing:.06em;text-transform:uppercase;
  color:#B58A00;
}
.match-row .match-foot{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  text-align:center;margin-top:10px;padding-top:10px;
  border-top:1px solid #EEF2F0;
}
.match-row .saiba{
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--turf-dim);
}
.match-row .result-line{
  display:flex;align-items:center;gap:8px;letter-spacing:.04em;
}
.match-row .mini-flag{
  display:inline-block;line-height:0;
  width:20px;height:15px;border-radius:2px;overflow:hidden;
  box-shadow:0 0 0 1px #E1E6E3;
}
.match-row .mini-flag svg{display:block;width:100%;height:100%;}
.match-row .group-tag{
  display:inline-block;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:.62rem;
  letter-spacing:.1em;
  padding:2px 8px;border-radius:999px;
  margin-left:8px;
  color:#fff;
  background:var(--accent, var(--turf));
  vertical-align:middle;
}
.badge{
  font-family:'Oswald',sans-serif;
  font-weight:700;
  font-size:.7rem;
  letter-spacing:.05em;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:999px;
}
.badge.exact{background:rgba(52,199,123,.16); color:var(--turf-dim); border:1px solid var(--turf);}
.badge.result{background:rgba(255,200,69,.18); color:#A8780B; border:1px solid var(--amber);}
.badge.miss{background:rgba(255,111,111,.14); color:#C23A3A; border:1px solid var(--bad);}
.badge.pending{background:#F1F5F2; color:#8C9A95; border:1px solid #DCE4E0;}

/* ---------- LEADERBOARD ---------- */
.board{
  padding:20px;
  display:flex;flex-direction:column;gap:10px;
}
.board-row{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 18px;
}
.rank{
  font-family:'Oswald',sans-serif;
  font-weight:700;font-size:1.3rem;
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface-2);color:var(--muted);
  flex:0 0 auto;
}
.board-row:nth-child(1) .rank{background:var(--amber);color:#06160E;}
.board-row:nth-child(2) .rank{background:#C9D3CE;color:#06160E;}
.board-row:nth-child(3) .rank{background:#C98A4B;color:#06160E;}
.board-name{
  flex:1;
  font-family:'Oswald',sans-serif;
  font-weight:600;font-size:1.05rem;
  text-transform:uppercase;letter-spacing:.03em;
}
.board-stats{
  display:flex;gap:18px;align-items:center;
  font-family:'JetBrains Mono',monospace;
  font-size:.75rem;color:var(--muted);
}
.board-stats .pts{
  font-family:'Oswald',sans-serif;
  font-size:1.5rem;font-weight:700;color:var(--amber);
  min-width:64px;text-align:right;
}
.board-stats .pts span{font-size:.7rem;color:var(--muted);font-family:'Inter',sans-serif;text-transform:uppercase;margin-left:4px;}
.empty{
  text-align:center;color:var(--muted);
  padding:50px 20px;font-size:.9rem;
}
.sync{
  text-align:center;font-size:.7rem;color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  padding:6px 0 0;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.shared-note{
  text-align:center;font-size:.72rem;color:var(--muted);
  padding:12px 20px 0;
}

/* ---------- MODAL DE SENHA ---------- */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(6,16,12,.72);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.modal-box{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:14px;
  padding:24px;
  max-width:320px;width:100%;
  text-align:center;
}
.modal-box h3{
  font-family:'Oswald',sans-serif;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  font-size:1.05rem;margin:0 0 8px;color:var(--cream);
}
.modal-box p{
  font-size:.8rem;color:var(--muted);margin:0 0 16px;
}
.modal-box input{
  width:100%;
  font-family:'JetBrains Mono',monospace;
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px 12px;
  color:var(--cream);
  font-size:1rem;
  text-align:center;
  outline:none;
  margin-bottom:10px;
}
.modal-box input:focus{border-color:var(--amber);}
.modal-box .modal-actions{
  display:flex;gap:8px;
}
.modal-box button{
  flex:1;
  font-family:'Oswald',sans-serif;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;
  font-size:.78rem;
  border-radius:8px;
  padding:10px;
  cursor:pointer;
  border:1px solid var(--line);
  background:var(--surface-2);
  color:var(--muted);
}
.modal-box button.primary{
  background:var(--turf-dim);
  border-color:var(--turf);
  color:var(--cream);
}
.modal-box button.primary:hover{background:var(--turf);color:#06160E;}
.modal-box .modal-error{
  color:var(--bad);font-size:.75rem;margin:-4px 0 10px;
  min-height:1em;
}

@media (max-width:480px){
  .match-row .side .flag{font-size:1.2rem;}
  .match-row .score input{width:34px;height:34px;font-size:1.05rem;}
  .match-row{padding:12px;}
  .match-row .side{font-size:.78rem;}
  .round-nav .rn-title{min-width:110px;font-size:.82rem;}
}
</style>
</head>

function dateLabel(dStr){
  const [dd, mm] = dStr.split("/").map(Number);
  const matchDate = new Date(2026, mm - 1, dd);
  const today = new Date();
  const t0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diffDays = Math.round((matchDate - t0) / 86400000);
  if(diffDays === 0) return "Hoje";
  if(diffDays === -1) return "Ontem";
  if(diffDays === 1) return "Amanhã";
  return null;
}

// Verifica se o jogo já começou, considerando data/hora em horário de Brasília (UTC-3)
function matchStarted(match){
  const [dd, mm] = match.d.split("/").map(Number);
  const [hh, mi] = match.t.split(":").map(Number);
  const startUTC = new Date(Date.UTC(2026, mm - 1, dd, hh + 3, mi));
  return new Date() >= startUTC;
}

function slug(name){
  return "palpites_" + name.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,40);
}

// ---------- ARMAZENAMENTO ----------
// 1) Dentro do Claude.ai (artefato publicado): usa window.storage (compartilhado entre todos).
// 2) Hospedado fora (Vercel etc.): se FIREBASE_DB_URL estiver preenchida, usa o Firebase
//    Realtime Database (gratuito) - todos compartilham os mesmos dados.
// 3) Sem nenhum dos dois: usa localStorage (salva só neste navegador/computador).
const FIREBASE_DB_URL = "https://bolao-financeiro-default-rtdb.firebaseio.com"; // projeto: bolao-financeiro

const STORAGE_MODE = window.storage
  ? "claude"
  : (FIREBASE_DB_URL ? "firebase" : "local");

async function storeGet(key){
  if(STORAGE_MODE === "claude"){
    try{
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : null;
    }catch(e){ return null; }
  }
  if(STORAGE_MODE === "firebase"){
    try{
      const res = await fetch(`${FIREBASE_DB_URL}/bolao/${key}.json`);
      const data = await res.json();
      return data === null ? null : data;
    }catch(e){ return null; }
  }
  try{
    const v = localStorage.getItem("bolao_"+key);
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}

async function storeSet(key, val){
  if(STORAGE_MODE === "claude"){
    try{ await window.storage.set(key, JSON.stringify(val), true); }
    catch(e){ console.error("storage set falhou", e); }
    return;
  }
  if(STORAGE_MODE === "firebase"){
    try{
      await fetch(`${FIREBASE_DB_URL}/bolao/${key}.json`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(val)
      });
    }catch(e){ console.error("firebase set falhou", e); }
    return;
  }
  try{ localStorage.setItem("bolao_"+key, JSON.stringify(val)); }
  catch(e){ console.error("localStorage set falhou", e); }
}

function debounce(fn, ms){
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

function calcPoints(pick, real){
  if(!pick || !real) return null;
  if(pick.h===undefined||pick.h===null||pick.h===""||pick.a===""||pick.a===undefined||pick.a===null) return null;
  if(real.h===undefined||real.h===null||real.h===""||real.a===""||real.a===undefined||real.a===null) return null;
  const ph=+pick.h, pa=+pick.a, rh=+real.h, ra=+real.a;
  if([ph,pa,rh,ra].some(isNaN)) return null;
  if(ph===rh && pa===ra) return 3;
  const s1 = Math.sign(ph-pa), s2 = Math.sign(rh-ra);
  return s1===s2 ? 1 : 0;
}

async function ensurePicks(name){
  if(!state.picks[name]) state.picks[name] = await storeGet(slug(name)) || {};
  return state.picks[name];
}

const savePicks = debounce(async (name) => {
  await storeSet(slug(name), state.picks[name]);
}, 400);

const saveResults = debounce(async () => {
  await storeSet(RESULTS_KEY, state.results);
}, 400);

const saveParticipants = async () => {
  await storeSet(PARTICIPANTS_KEY, state.participants);
};

// ---------- RENDER HELPERS ----------
function matchScoreInputs(match, mode){
  let hVal="", aVal="";
  if(mode==="palpites" && state.active){
    const p = state.picks[state.active]?.[match.id];
    if(p){ hVal = p.h ?? ""; aVal = p.a ?? ""; }
  } else if(mode==="resultados"){
    const r = state.results[match.id];
    if(r){ hVal = r.h ?? ""; aVal = r.a ?? ""; }
  }
  const locked = mode==="palpites" && matchStarted(match);
  const dis = locked ? "disabled" : "";
  return `
    <div class="score">
      <input type="number" min="0" max="20" inputmode="numeric" value="${hVal}" ${dis}
        data-match="${match.id}" data-side="h" data-mode="${mode}">
      <span class="x">×</span>
      <input type="number" min="0" max="20" inputmode="numeric" value="${aVal}" ${dis}
        data-match="${match.id}" data-side="a" data-mode="${mode}">
    </div>`;
}

function pointsBadge(match){
  if(!state.active) return "";
  const real = state.results[match.id];
  const pick = state.picks[state.active]?.[match.id];
  const pts = calcPoints(pick, real);
  if(real===undefined || real?.h==="" || real?.h===undefined){
    return `<span class="badge pending">Aguardando</span>`;
  }
  if(pts===null) return `<span class="badge pending">Sem palpite</span>`;
  if(pts===3) return `<span class="badge exact">+3 placar exato</span>`;
  if(pts===1) return `<span class="badge result">+1 resultado</span>`;
  return `<span class="badge miss">0 pts</span>`;
}

function realRow(match){
  const r = state.results[match.id];
  if(r===undefined || r?.h==="" || r?.h===undefined || r?.a===""||r?.a===undefined) return "";
  return `<div class="real-row"><span>Resultado oficial</span><b>${r.h} × ${r.a}</b></div>`;
}

function matchRow(match, mode){
  const accent = groupColor(match.g);
  const rel = dateLabel(match.d);
  const dateBits = [match.d];
  if(rel) dateBits.push(rel);
  dateBits.push(match.t);

  let foot = "";
  if(mode==="palpites"){
    const r = state.results[match.id];
    const hasResult = r && r.h!=="" && r.h!==undefined && r.a!=="" && r.a!==undefined;
    const resultLine = hasResult
      ? `<span class="saiba result-line">
           ${flagSVG(match.hi,"mini-flag")}
           ${r.h} × ${r.a}
           ${flagSVG(match.ai,"mini-flag")}
         </span>`
      : `<span class="saiba" style="color:#B7C2BD">Aguardando resultado</span>`;
    foot = `<div class="match-foot">
        ${resultLine}
        ${pointsBadge(match)}
      </div>`;
  }

  const lockedTag = (mode==="palpites" && matchStarted(match))
    ? `<span class="lock-tag">🔒 Iniciado</span>` : "";

  return `
    <div class="match-row" style="--accent:${accent}">
      <div class="match-head">
        <span class="stadium">${match.st}</span>&nbsp; ${dateBits.join(" • ")}
        <span class="group-tag">${match.g}</span>
        ${lockedTag}
      </div>
      <div class="match-body">
        <div class="side home"><span class="tname">${match.h}</span>${flagSVG(match.hi,"flag")}</div>
        ${matchScoreInputs(match, mode)}
        <div class="side away">${flagSVG(match.ai,"flag")}<span class="tname">${match.a}</span></div>
      </div>
      ${foot}
    </div>`;
}

function filteredMatches(){
  let list = state.group==="Todos" ? MATCHES : MATCHES.filter(m=>m.g===state.group);
  if(state.tab!=="classificacao") list = list.filter(m=>m.r===state.round);
  return list;
}

// ---------- VIEWS ----------
function renderFilters(){
  const row = document.getElementById("filterRow");
  if(state.tab==="classificacao"){ row.innerHTML=""; return; }
  const groups = ["Todos", ...GROUPS];
  row.innerHTML = groups.map(g =>
    `<button class="pill ${g===state.group?'active':''}" data-group="${g}">${g==="Todos"?"Todos":"Grupo "+g}</button>`
  ).join("");
  row.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{ state.group = btn.dataset.group; render(); });
  });
}

function renderParticipants(){
  const row = document.getElementById("participantRow");
  if(state.tab!=="palpites"){ row.innerHTML=""; return; }
  let html = state.participants.map(p =>
    `<button class="pill ${p===state.active?'active':''}" data-p="${p}">${p}<span class="remove" data-remove="${p}">✕</span></button>`
  ).join("");
  html += `<div class="add-participant">
      <input type="text" id="newParticipant" placeholder="Nome do participante" maxlength="24">
      <button id="addParticipantBtn">Adicionar</button>
    </div>`;
  row.innerHTML = html;

  row.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", async (e)=>{
      if(e.target.dataset.remove) return;
      state.active = btn.dataset.p;
      await ensurePicks(state.active);
      render();
    });
  });
  row.querySelectorAll(".remove").forEach(el=>{
    el.addEventListener("click", async (e)=>{
      e.stopPropagation();
      const name = el.dataset.remove;
      state.participants = state.participants.filter(p=>p!==name);
      delete state.picks[name];
      if(state.active===name) state.active = state.participants[0] || null;
      await saveParticipants();
      render();
    });
  });
  document.getElementById("addParticipantBtn").addEventListener("click", async ()=>{
    const input = document.getElementById("newParticipant");
    const name = input.value.trim();
    if(!name) return;
    if(state.participants.includes(name)) return;
    state.participants.push(name);
    state.active = name;
    await ensurePicks(name);
    await saveParticipants();
    render();
  });
  document.getElementById("newParticipant").addEventListener("keydown", (e)=>{
    if(e.key==="Enter") document.getElementById("addParticipantBtn").click();
  });
}

function renderRoundNav(){
  const el = document.getElementById("roundNav");
  if(state.tab==="classificacao"){ el.innerHTML=""; return; }
  el.innerHTML = `
    <div class="round-nav">
      <button class="rn-arrow" id="rnPrev">‹</button>
      <span class="rn-title">${ORDINAL[state.round]} RODADA</span>
      <button class="rn-arrow" id="rnNext">›</button>
    </div>`;
  document.getElementById("rnPrev").addEventListener("click", ()=>{
    state.round = state.round===1 ? 3 : state.round-1; render();
  });
  document.getElementById("rnNext").addEventListener("click", ()=>{
    state.round = state.round===3 ? 1 : state.round+1; render();
  });
}

async function renderContent(){
  const content = document.getElementById("content");

  if(state.tab==="palpites"){
    if(!state.active){
      content.innerHTML = `<div class="empty">Adicione seu nome acima para começar a registrar seus palpites ⚽</div>`;
      return;
    }
    await ensurePicks(state.active);
    content.innerHTML = `<div class="match-list">${filteredMatches().map(m=>matchRow(m,"palpites")).join("")}</div>`;
    bindScoreInputs("palpites");
  }

  else if(state.tab==="resultados"){
    if(!state.resultsUnlocked){
      content.innerHTML = `<div class="empty">
          🔒 Esta área é protegida por senha para evitar que qualquer pessoa altere os resultados oficiais.
          <br><br>
          <button id="unlockBtn" class="add-participant"
            style="font-family:'Oswald',sans-serif;font-weight:600;background:var(--turf-dim);color:var(--cream);border:1px solid var(--turf);border-radius:999px;padding:10px 20px;font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;">
            Digitar senha
          </button>
        </div>`;
      document.getElementById("unlockBtn").addEventListener("click", showPasswordModal);
      return;
    }
    content.innerHTML = `<div class="match-list">${filteredMatches().map(m=>matchRow(m,"resultados")).join("")}</div>`;
    bindScoreInputs("resultados");
  }

  else if(state.tab==="classificacao"){
    if(state.participants.length===0){
      content.innerHTML = `<div class="empty">Nenhum participante cadastrado ainda. Vá na aba "Palpites" e adicione participantes.</div>`;
      return;
    }
    for(const p of state.participants) await ensurePicks(p);

    const rows = state.participants.map(name=>{
      let total=0, exact=0, hit=0, played=0;
      for(const m of MATCHES){
        const real = state.results[m.id];
        const pick = state.picks[name]?.[m.id];
        const pts = calcPoints(pick, real);
        if(pts!==null){
          played++;
          total += pts;
          if(pts===3) exact++;
          if(pts===1) hit++;
        }
      }
      return {name, total, exact, hit, played};
    }).sort((a,b)=> b.total - a.total);

    content.innerHTML = `<div class="board">${rows.map((r,i)=>`
      <div class="board-row">
        <div class="rank">${i+1}</div>
        <div class="board-name">${r.name}</div>
        <div class="board-stats">
          <div>${r.exact} <span>Exatos</span></div>
          <div>${r.hit} <span>Resultados</span></div>
          <div>${r.played}/${MATCHES.length} <span>Jogos</span></div>
          <div class="pts">${r.total}<span>pts</span></div>
        </div>
      </div>`).join("")}</div>`;
  }
}

function bindScoreInputs(mode){
  document.querySelectorAll(`input[data-mode="${mode}"]`).forEach(inp=>{
    inp.addEventListener("input", async ()=>{
      const id = +inp.dataset.match;
      const side = inp.dataset.side;
      let v = inp.value;
      if(v!=="" ){
        let n = Math.max(0, Math.min(20, parseInt(v,10)||0));
        v = String(n);
        inp.value = v;
      }
      if(mode==="palpites"){
        const obj = state.picks[state.active][id] || {};
        obj[side] = v;
        state.picks[state.active][id] = obj;
        savePicks(state.active);
        // atualiza badge/linha de resultado sem re-renderizar tudo
        refreshCardFeedback(id);
      } else {
        const obj = state.results[id] || {};
        obj[side] = v;
        state.results[id] = obj;
        saveResults();
        refreshAllBadgesFor(id);
      }
    });
  });
}

function refreshCardFeedback(matchId){
  if(state.tab!=="palpites") return;
  const match = MATCHES.find(m=>m.id===matchId);
  document.querySelectorAll(".match-list .match-row").forEach(card=>{
    if(card.innerHTML.includes(`>${match.h}<`) && card.innerHTML.includes(`>${match.a}<`)){
      const foot = card.querySelector(".match-foot");
      if(foot){
        const r = state.results[match.id];
        const hasResult = r && r.h!=="" && r.h!==undefined && r.a!=="" && r.a!==undefined;
        const resultLine = hasResult
          ? `<span class="saiba result-line">
               ${flagSVG(match.hi,"mini-flag")}
               ${r.h} × ${r.a}
               ${flagSVG(match.ai,"mini-flag")}
             </span>`
          : `<span class="saiba" style="color:#B7C2BD">Aguardando resultado</span>`;
        foot.innerHTML = `${resultLine}${pointsBadge(match)}`;
      }
    }
  });
}
function refreshAllBadgesFor(){ /* aba resultados não precisa feedback extra */ }

// ---------- TABS ----------
document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click", async ()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    state.tab = btn.dataset.tab;
    state.group = "Todos";
    state.round = 1;
    render();
  });
});

async function render(){
  renderParticipants();
  renderFilters();
  renderRoundNav();
  await renderContent();
}

// ---------- MODAL DE SENHA (aba Resultados) ----------
function showPasswordModal(){
  const modal = document.getElementById("pwModal");
  const input = document.getElementById("pwInput");
  document.getElementById("pwError").textContent = "";
  input.value = "";
  modal.style.display = "flex";
  setTimeout(()=>input.focus(), 50);
}
function hidePasswordModal(){
  document.getElementById("pwModal").style.display = "none";
}
function tryUnlock(){
  const input = document.getElementById("pwInput");
  if(input.value === RESULTS_PASSWORD){
    state.resultsUnlocked = true;
    try{ sessionStorage.setItem("bolao_results_unlocked","1"); }catch(e){}
    hidePasswordModal();
    render();
  } else {
    document.getElementById("pwError").textContent = "Senha incorreta.";
    input.value = "";
    input.focus();
  }
}
document.getElementById("pwConfirm").addEventListener("click", tryUnlock);
document.getElementById("pwCancel").addEventListener("click", hidePasswordModal);
document.getElementById("pwInput").addEventListener("keydown", (e)=>{
  if(e.key === "Enter") tryUnlock();
});

async function init(){
  try{ if(sessionStorage.getItem("bolao_results_unlocked")==="1") state.resultsUnlocked = true; }catch(e){}
  const note = document.getElementById("shareNote");
  if(STORAGE_MODE === "local"){
    note.innerHTML = "⚠️ Armazenamento compartilhado não configurado: os dados ficam salvos só neste navegador/computador (não sincronizam entre pessoas).";
  } else {
    note.textContent = "Os palpites e resultados ficam salvos para todos que abrirem este bolão.";
  }
  state.participants = await storeGet(PARTICIPANTS_KEY) || [];
  state.results = await storeGet(RESULTS_KEY) || {};

  // aplica resultados pré-preenchidos (SEED_RESULTS) que ainda não existirem
  let seeded = false;
  for(const [id, r] of Object.entries(SEED_RESULTS)){
    if(!state.results[id] || state.results[id].h===undefined || state.results[id].h===""){
      state.results[id] = r;
      seeded = true;
    }
  }
  if(seeded) await storeSet(RESULTS_KEY, state.results);

  if(state.participants.length) state.active = state.participants[0];
  render();
}
init();
</script>
